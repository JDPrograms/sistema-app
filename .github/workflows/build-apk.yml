name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      site_slug:
        description: "Slug del sitio (ej: academiaplay)"
        required: true
      package_name:
        description: "Package name Android (ej: com.app.academiaplay)"
        required: true
      app_name:
        description: "Nombre de la app (ej: Academia Play)"
        required: true
      site_url:
        description: "URL del sitio (ej: https://fastsystem.vercel.app/site/academiaplay)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create output directory
        run: mkdir -p twa-build

      - name: Generate signing key (if no secret provided)
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            keytool -genkeypair -v \
              -keystore twa-build/release.keystore \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android123 \
              -keypass android123 \
              -dname "CN=${{ inputs.app_name }}, O=FastSystem, L=Unknown, S=Unknown, C=US"
            echo "KEYSTORE_PATH=../twa-build/release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASS=android123" >> $GITHUB_ENV
            echo "KEY_ALIAS=upload" >> $GITHUB_ENV
            echo "KEY_PASS=android123" >> $GITHUB_ENV
          fi

      - name: Restore keystore from secret
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > twa-build/release.keystore
          echo "KEYSTORE_PATH=../twa-build/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASS=${{ secrets.ANDROID_KEYSTORE_PASS }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASS=${{ secrets.ANDROID_KEY_PASS }}" >> $GITHUB_ENV

      - name: Initialize TWA project with Bubblewrap
        run: |
          cd twa-build
          bubblewrap init \
            --manifest="${{ inputs.site_url }}/manifest.json" \
            --directory=app \
            --packageId="${{ inputs.package_name }}" \
            --name="${{ inputs.app_name }}" \
            --signingKeyPath="${KEYSTORE_PATH}" \
            --signingKeyAlias="${KEY_ALIAS}" \
            --signingKeyStorePassword="${KEYSTORE_PASS}" \
            --signingKeyPassword="${KEY_PASS}" \
            --skipPwaValidation

      - name: Build APK
        run: |
          cd twa-build/app
          bubblewrap build

      - name: Rename APK
        run: |
          find twa-build -name "*.apk" -exec cp {} twa-build/${{ inputs.site_slug }}-release.apk \;
          find twa-build -name "*.aab" -exec cp {} twa-build/${{ inputs.site_slug }}-release.aab \; || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.site_slug }}
          path: |
            twa-build/${{ inputs.site_slug }}-release.apk
            twa-build/${{ inputs.site_slug }}-release.aab
          retention-days: 30

      - name: Print fingerprint
        run: |
          echo "=== SHA-256 Fingerprint para assetlinks.json ==="
          keytool -list -v -keystore twa-build/release.keystore \
            -alias upload -storepass "${KEYSTORE_PASS}" 2>/dev/null \
            | grep "SHA256:"
